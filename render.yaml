services:
  - type: web
    name: hellodoctorrx
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hellodoctor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: hellodoctor-db
    databaseName: hellodoctor
    user: hellodoctor
